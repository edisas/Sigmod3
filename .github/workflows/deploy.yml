name: Deploy SIGMOD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  BACK_REMOTE_PATH: /var/www/vhosts/sigmod.mx/api3
  FRONT_REMOTE_PATH: /var/www/vhosts/sigmod.mx/v3
  PLESK_OWNER: sigmod.mx_suz2p5l2ds:psacln

jobs:
  deploy:
    name: Deploy backend + frontend
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── Build / validación local en el runner ─────────────────
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          # prod usa Python 3.10 (ubuntu 22.04). El CI debe replicarlo para
          # atrapar imports incompatibles (ej. datetime.UTC es 3.11+).
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: back/requirements.txt

      - name: Backend venv + deps
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/pip install -r back/requirements.txt
          /tmp/venv/bin/pip install ruff pytest pytest-anyio httpx

      - name: Backend lint (ruff)
        working-directory: back
        run: /tmp/venv/bin/ruff check app tests

      - name: Backend unit tests (pytest)
        working-directory: back
        run: PYTHONPATH=. /tmp/venv/bin/pytest tests -q

      - name: Backend smoke test
        run: PYTHONPATH=back /tmp/venv/bin/python -c "from app.main import app; print('OK', len(app.routes), 'routes')"

      - name: Node setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Frontend npm ci
        working-directory: front
        run: npm ci

      - name: Frontend lint (eslint)
        working-directory: front
        run: npm run lint

      - name: Frontend unit tests (vitest)
        working-directory: front
        run: npm run test:unit

      - name: Frontend build
        working-directory: front
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # ── SSH setup ─────────────────────────────────────────────
      - name: Cargar SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      # ── Fase "as sudoer": tomar ownership ─────────────────────
      - name: Tomar ownership de los directorios deploy
        id: take_ownership
        run: |
          ssh -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
              'set -e
               sudo mkdir -p ${{ env.BACK_REMOTE_PATH }} ${{ env.FRONT_REMOTE_PATH }}
               sudo chown -R $(id -un):$(id -gn) ${{ env.BACK_REMOTE_PATH }} ${{ env.FRONT_REMOTE_PATH }}'

      # ── Rsync del backend ─────────────────────────────────────
      - name: Rsync backend
        run: |
          rsync -azv --delete \
            --exclude='.venv/' \
            --exclude='__pycache__/' \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='storage/' \
            --exclude='tests/' \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT || '22' }}" \
            back/ ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ env.BACK_REMOTE_PATH }}/

      # ── Rsync del frontend ────────────────────────────────────
      - name: Rsync frontend (dist)
        run: |
          rsync -azv --delete \
            -e "ssh -p ${{ secrets.DEPLOY_SSH_PORT || '22' }}" \
            front/dist/ ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}:${{ env.FRONT_REMOTE_PATH }}/

      # ── Post-deploy backend (pip + migrate + restart systemd) ───
      - name: Backend — pip install, migraciones, restart
        run: |
          ssh -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
              'bash -lc "set -e
                cd ${{ env.BACK_REMOTE_PATH }}
                [ -d .venv ] || python3 -m venv .venv
                .venv/bin/pip install --upgrade pip
                .venv/bin/pip install -r requirements.txt
                .venv/bin/python migrate.py apply
                mkdir -p storage/solicitudes_generadas \
                  storage/solicitudes_firmadas \
                  storage/figura_cooperadora_autorizaciones \
                  storage/figura_cooperadora_revocaciones \
                  storage/system
                sudo /bin/systemctl restart sigmod-api3
              "'

      # ── Restore ownership (solo si tomamos ownership antes) ──
      - name: Restaurar ownership al usuario Plesk
        if: always() && steps.take_ownership.conclusion == 'success'
        run: |
          ssh -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
              'sudo chown -R ${{ env.PLESK_OWNER }} ${{ env.BACK_REMOTE_PATH }} ${{ env.FRONT_REMOTE_PATH }}'
