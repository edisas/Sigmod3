name: Debug SSH

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Cargar SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Fingerprint de la llave cargada
        run: ssh-add -l

      - name: Known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} ${{ secrets.DEPLOY_SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Longitud de secrets (sin revelar valores)
        run: |
          printf 'DEPLOY_SSH_USER length: %d\n' "${#DEPLOY_SSH_USER}"
          printf 'DEPLOY_SSH_HOST length: %d\n' "${#DEPLOY_SSH_HOST}"
          printf 'DEPLOY_SSH_PORT:        "%s"\n' "${DEPLOY_SSH_PORT:-22}"
          printf 'DEPLOY_SSH_KEY lines:   %d\n' "$(echo -n "$DEPLOY_SSH_KEY" | wc -l)"
          printf 'DEPLOY_SSH_KEY bytes:   %d\n' "${#DEPLOY_SSH_KEY}"
          printf 'Begins with BEGIN?      %s\n' "$(case "$DEPLOY_SSH_KEY" in "-----BEGIN"*) echo yes;; *) echo NO;; esac)"
          printf 'Ends with END PK dash?  %s\n' "$(case "$DEPLOY_SSH_KEY" in *"PRIVATE KEY-----"|*"PRIVATE KEY-----"$'\n') echo yes;; *) echo NO;; esac)"
        env:
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}

      - name: SSH verbose (solo publickey, sin password)
        run: |
          ssh -vvv \
              -p ${{ secrets.DEPLOY_SSH_PORT || '22' }} \
              -o BatchMode=yes \
              -o PreferredAuthentications=publickey \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }} \
              "echo OK; whoami; id; pwd"
